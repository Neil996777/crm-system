x-go-healthcheck: &go-healthcheck
  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1"]
  interval: 10s
  timeout: 5s
  retries: 12

x-go-service-defaults: &go-service-defaults
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  expose:
    - "8080"
  healthcheck: *go-healthcheck
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - crm_internal

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - /opt/crm-system/volumes/postgres:/var/lib/postgresql/data
      - /opt/crm-system/current/services/identity-authz/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/001_identity_authz.sql:ro
      - /opt/crm-system/current/services/identity-authz/migrations/0002_users_sessions.up.sql:/docker-entrypoint-initdb.d/002_identity_authz_users_sessions.sql:ro
      - /opt/crm-system/current/services/identity-authz/migrations/0003_permission_policy.up.sql:/docker-entrypoint-initdb.d/003_identity_authz_permission_policy.sql:ro
      - /opt/crm-system/current/services/lead/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/004_lead.sql:ro
      - /opt/crm-system/current/services/account/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/005_account.sql:ro
      - /opt/crm-system/current/services/account/migrations/0002_accounts.up.sql:/docker-entrypoint-initdb.d/006_account_accounts.sql:ro
      - /opt/crm-system/current/services/account/migrations/0003_contacts.up.sql:/docker-entrypoint-initdb.d/007_account_contacts.sql:ro
      - /opt/crm-system/current/services/opportunity/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/008_opportunity.sql:ro
      - /opt/crm-system/current/services/opportunity/migrations/0002_opportunities.up.sql:/docker-entrypoint-initdb.d/009_opportunity_opportunities.sql:ro
      - /opt/crm-system/current/services/commercial/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/010_commercial.sql:ro
      - /opt/crm-system/current/services/commercial/migrations/0002_quotes.up.sql:/docker-entrypoint-initdb.d/011_commercial_quotes.sql:ro
      - /opt/crm-system/current/services/commercial/migrations/0003_contracts.up.sql:/docker-entrypoint-initdb.d/012_commercial_contracts.sql:ro
      - /opt/crm-system/current/services/commercial/migrations/0004_payments.up.sql:/docker-entrypoint-initdb.d/013_commercial_payments.sql:ro
      - /opt/crm-system/current/services/work/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/014_work.sql:ro
      - /opt/crm-system/current/services/audit-history/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/015_audit_history.sql:ro
      - /opt/crm-system/current/services/audit-history/migrations/0002_history_oplog.up.sql:/docker-entrypoint-initdb.d/016_audit_history_events.sql:ro
      - /opt/crm-system/current/services/audit-history/migrations/0003_retention_metadata.up.sql:/docker-entrypoint-initdb.d/016b_audit_history_retention.sql:ro
      - /opt/crm-system/current/services/reporting/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/017_reporting.sql:ro
      - /opt/crm-system/current/services/import-export/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/018_import_export.sql:ro
      - /opt/crm-system/current/services/lead/migrations/0002_leads.up.sql:/docker-entrypoint-initdb.d/019_lead_leads.sql:ro
      - /opt/crm-system/current/services/lead/migrations/0003_lead_qualification.up.sql:/docker-entrypoint-initdb.d/020_lead_qualification.sql:ro
      - /opt/crm-system/current/services/account/migrations/0004_duplicate_warnings.up.sql:/docker-entrypoint-initdb.d/021_account_duplicate_warnings.sql:ro
      - /opt/crm-system/current/services/account/migrations/0005_archive.up.sql:/docker-entrypoint-initdb.d/022_account_archive.sql:ro
      - /opt/crm-system/current/services/lead/migrations/0004_duplicate_warnings.up.sql:/docker-entrypoint-initdb.d/023_lead_duplicate_warnings.sql:ro
      - /opt/crm-system/current/services/work/migrations/0002_work.up.sql:/docker-entrypoint-initdb.d/024_work_items.sql:ro
      - /opt/crm-system/current/services/lead/migrations/0005_archive.up.sql:/docker-entrypoint-initdb.d/025_lead_archive.sql:ro
      - /opt/crm-system/current/services/opportunity/migrations/0003_archive.up.sql:/docker-entrypoint-initdb.d/026_opportunity_archive.sql:ro
      - /opt/crm-system/current/services/commercial/migrations/0005_archive.up.sql:/docker-entrypoint-initdb.d/027_commercial_archive.sql:ro
      - /opt/crm-system/current/services/reporting/migrations/0002_reporting_projections.up.sql:/docker-entrypoint-initdb.d/028_reporting_projections.sql:ro
      - /opt/crm-system/current/services/import-export/migrations/0002_import_export_runs.up.sql:/docker-entrypoint-initdb.d/029_import_export_runs.sql:ro
      - /opt/crm-system/current/services/import-export/migrations/0003_export_runs.up.sql:/docker-entrypoint-initdb.d/030_export_runs.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER required} -d ${POSTGRES_DB:?POSTGRES_DB required}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - crm_internal

  gateway-bff:
    <<: *go-service-defaults
    build:
      context: ./services/gateway-bff
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/gateway-bff:${CRM_IMAGE_TAG:-latest}
    read_only: false
    environment:
      SERVICE_NAME: gateway-bff
      PORT: "8080"
      IDENTITY_AUTHZ_URL: http://identity-authz:8080
      LEAD_SERVICE_URL: http://lead:8080
      ACCOUNT_SERVICE_URL: http://account:8080
      OPPORTUNITY_SERVICE_URL: http://opportunity:8080
      COMMERCIAL_SERVICE_URL: http://commercial:8080
      WORK_SERVICE_URL: http://work:8080
      REPORTING_SERVICE_URL: http://reporting:8080
      IMPORT_EXPORT_SERVICE_URL: http://import-export:8080
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /opt/crm-system/logs/gateway-bff:/var/log/crm-system
    networks:
      - crm_internal
      - crm_edge

  identity-authz:
    <<: *go-service-defaults
    build:
      context: ./services/identity-authz
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/identity-authz:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: identity-authz
      PORT: "8080"
      COOKIE_SECURE: "true"
      DATABASE_URL: ${IDENTITY_AUTHZ_DATABASE_URL:?IDENTITY_AUTHZ_DATABASE_URL required}
      SERVICE_ID: identity-authz
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
    volumes:
      - /opt/crm-system/logs/identity-authz:/var/log/crm-system

  lead:
    <<: *go-service-defaults
    build:
      context: ./services/lead
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/lead:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: lead
      SERVICE_ID: lead
      PORT: "8080"
      DATABASE_URL: ${LEAD_DATABASE_URL:?LEAD_DATABASE_URL required}
      ACCOUNT_SERVICE_URL: http://account:8080
      OPPORTUNITY_SERVICE_URL: http://opportunity:8080
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
    volumes:
      - /opt/crm-system/logs/lead:/var/log/crm-system

  account:
    <<: *go-service-defaults
    build:
      context: ./services/account
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/account:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: account
      SERVICE_ID: account
      PORT: "8080"
      DATABASE_URL: ${ACCOUNT_DATABASE_URL:?ACCOUNT_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      WORK_SERVICE_URL: http://work:8080
    volumes:
      - /opt/crm-system/logs/account:/var/log/crm-system

  opportunity:
    <<: *go-service-defaults
    build:
      context: ./services/opportunity
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/opportunity:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: opportunity
      SERVICE_ID: opportunity
      PORT: "8080"
      DATABASE_URL: ${OPPORTUNITY_DATABASE_URL:?OPPORTUNITY_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      COMMERCIAL_SERVICE_URL: http://commercial:8080
    volumes:
      - /opt/crm-system/logs/opportunity:/var/log/crm-system

  commercial:
    <<: *go-service-defaults
    build:
      context: ./services/commercial
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/commercial:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: commercial
      SERVICE_ID: commercial
      PORT: "8080"
      DATABASE_URL: ${COMMERCIAL_DATABASE_URL:?COMMERCIAL_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
    volumes:
      - /opt/crm-system/logs/commercial:/var/log/crm-system

  work:
    <<: *go-service-defaults
    build:
      context: ./services/work
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/work:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: work
      SERVICE_ID: work
      PORT: "8080"
      DATABASE_URL: ${WORK_DATABASE_URL:?WORK_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      COMMERCIAL_SERVICE_URL: http://commercial:8080
    volumes:
      - /opt/crm-system/logs/work:/var/log/crm-system

  audit-history:
    <<: *go-service-defaults
    build:
      context: ./services/audit-history
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/audit-history:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: audit-history
      PORT: "8080"
      DATABASE_URL: ${AUDIT_HISTORY_DATABASE_URL:?AUDIT_HISTORY_DATABASE_URL required}
      SERVICE_ID: audit-history
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
    volumes:
      - /opt/crm-system/logs/audit-history:/var/log/crm-system

  reporting:
    <<: *go-service-defaults
    build:
      context: ./services/reporting
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/reporting:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: reporting
      PORT: "8080"
      DATABASE_URL: ${REPORTING_DATABASE_URL:?REPORTING_DATABASE_URL required}
    volumes:
      - /opt/crm-system/logs/reporting:/var/log/crm-system

  import-export:
    <<: *go-service-defaults
    build:
      context: ./services/import-export
      dockerfile: ../../deploy/docker/go-service.Dockerfile
    image: crm-system/import-export:${CRM_IMAGE_TAG:-latest}
    environment:
      SERVICE_NAME: import-export
      PORT: "8080"
      DATABASE_URL: ${IMPORT_EXPORT_DATABASE_URL:?IMPORT_EXPORT_DATABASE_URL required}
      LEAD_SERVICE_URL: http://lead:8080
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      SERVICE_ID: import-export
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
    volumes:
      - /opt/crm-system/logs/import-export:/var/log/crm-system

networks:
  crm_internal:
    internal: true
  crm_edge:
