x-go-healthcheck: &go-healthcheck
  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1"]
  interval: 10s
  timeout: 5s
  retries: 12

x-frontend-healthcheck: &frontend-healthcheck
  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1"]
  interval: 10s
  timeout: 5s
  retries: 12

x-go-service-defaults: &go-service-defaults
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  expose:
    - "8080"
  healthcheck: *go-healthcheck
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - crm_internal

services:
  postgres:
    image: ${CRM_IMAGE_POSTGRES:?CRM_IMAGE_POSTGRES required}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - /opt/crm-system/volumes/postgres:/var/lib/postgresql/data
      - /opt/crm-system/releases/${CRM_RELEASE_COMMIT:?CRM_RELEASE_COMMIT required}/migrations:/release-migrations:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER required} -d ${POSTGRES_DB:?POSTGRES_DB required}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - crm_internal

  gateway-bff:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_GATEWAY_BFF:?CRM_IMAGE_GATEWAY_BFF required}
    read_only: false
    environment:
      SERVICE_NAME: gateway-bff
      PORT: "8080"
      IDENTITY_AUTHZ_URL: http://identity-authz:8080
      LEAD_SERVICE_URL: http://lead:8080
      ACCOUNT_SERVICE_URL: http://account:8080
      OPPORTUNITY_SERVICE_URL: http://opportunity:8080
      COMMERCIAL_SERVICE_URL: http://commercial:8080
      WORK_SERVICE_URL: http://work:8080
      REPORTING_SERVICE_URL: http://reporting:8080
      IMPORT_EXPORT_SERVICE_URL: http://import-export:8080
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /opt/crm-system/logs/gateway-bff:/var/log/crm-system
    networks:
      - crm_internal
      - crm_edge

  identity-authz:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_IDENTITY_AUTHZ:?CRM_IMAGE_IDENTITY_AUTHZ required}
    environment:
      SERVICE_NAME: identity-authz
      PORT: "8080"
      COOKIE_SECURE: "true"
      DATABASE_URL: ${IDENTITY_AUTHZ_DATABASE_URL:?IDENTITY_AUTHZ_DATABASE_URL required}
      SERVICE_ID: identity-authz
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
    volumes:
      - /opt/crm-system/logs/identity-authz:/var/log/crm-system

  lead:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_LEAD:?CRM_IMAGE_LEAD required}
    environment:
      SERVICE_NAME: lead
      SERVICE_ID: lead
      PORT: "8080"
      DATABASE_URL: ${LEAD_DATABASE_URL:?LEAD_DATABASE_URL required}
      ACCOUNT_SERVICE_URL: http://account:8080
      OPPORTUNITY_SERVICE_URL: http://opportunity:8080
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      REPORTING_SERVICE_URL: http://reporting:8080
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
    volumes:
      - /opt/crm-system/logs/lead:/var/log/crm-system

  account:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_ACCOUNT:?CRM_IMAGE_ACCOUNT required}
    environment:
      SERVICE_NAME: account
      SERVICE_ID: account
      PORT: "8080"
      DATABASE_URL: ${ACCOUNT_DATABASE_URL:?ACCOUNT_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      REPORTING_SERVICE_URL: http://reporting:8080
      WORK_SERVICE_URL: http://work:8080
    volumes:
      - /opt/crm-system/logs/account:/var/log/crm-system

  opportunity:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_OPPORTUNITY:?CRM_IMAGE_OPPORTUNITY required}
    environment:
      SERVICE_NAME: opportunity
      SERVICE_ID: opportunity
      PORT: "8080"
      DATABASE_URL: ${OPPORTUNITY_DATABASE_URL:?OPPORTUNITY_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      REPORTING_SERVICE_URL: http://reporting:8080
      COMMERCIAL_SERVICE_URL: http://commercial:8080
    volumes:
      - /opt/crm-system/logs/opportunity:/var/log/crm-system

  commercial:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_COMMERCIAL:?CRM_IMAGE_COMMERCIAL required}
    environment:
      SERVICE_NAME: commercial
      SERVICE_ID: commercial
      PORT: "8080"
      DATABASE_URL: ${COMMERCIAL_DATABASE_URL:?COMMERCIAL_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      REPORTING_SERVICE_URL: http://reporting:8080
    volumes:
      - /opt/crm-system/logs/commercial:/var/log/crm-system

  work:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_WORK:?CRM_IMAGE_WORK required}
    environment:
      SERVICE_NAME: work
      SERVICE_ID: work
      PORT: "8080"
      DATABASE_URL: ${WORK_DATABASE_URL:?WORK_DATABASE_URL required}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      COMMERCIAL_SERVICE_URL: http://commercial:8080
    volumes:
      - /opt/crm-system/logs/work:/var/log/crm-system

  audit-history:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_AUDIT_HISTORY:?CRM_IMAGE_AUDIT_HISTORY required}
    environment:
      SERVICE_NAME: audit-history
      PORT: "8080"
      DATABASE_URL: ${AUDIT_HISTORY_DATABASE_URL:?AUDIT_HISTORY_DATABASE_URL required}
      SERVICE_ID: audit-history
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
    volumes:
      - /opt/crm-system/logs/audit-history:/var/log/crm-system

  reporting:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_REPORTING:?CRM_IMAGE_REPORTING required}
    environment:
      SERVICE_NAME: reporting
      PORT: "8080"
      DATABASE_URL: ${REPORTING_DATABASE_URL:?REPORTING_DATABASE_URL required}
    volumes:
      - /opt/crm-system/logs/reporting:/var/log/crm-system

  import-export:
    <<: *go-service-defaults
    image: ${CRM_IMAGE_IMPORT_EXPORT:?CRM_IMAGE_IMPORT_EXPORT required}
    environment:
      SERVICE_NAME: import-export
      PORT: "8080"
      DATABASE_URL: ${IMPORT_EXPORT_DATABASE_URL:?IMPORT_EXPORT_DATABASE_URL required}
      LEAD_SERVICE_URL: http://lead:8080
      AUDIT_HISTORY_SERVICE_URL: http://audit-history:8080
      SERVICE_ID: import-export
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:?SERVICE_TOKEN_SECRET required}
    volumes:
      - /opt/crm-system/logs/import-export:/var/log/crm-system

  frontend-web:
    image: ${CRM_IMAGE_FRONTEND_WEB:?CRM_IMAGE_FRONTEND_WEB required}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx:uid=101,gid=101,mode=0770
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck: *frontend-healthcheck
    networks:
      - crm_edge

networks:
  crm_internal:
    internal: true
  crm_edge:
